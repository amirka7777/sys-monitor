syntax = "proto3";

package proto;

option go_package = "github.com/amir/sys-monitor/proto";

service MetricsService {
    rpc SendMetrics (MetricRequest) returns (MetricResponse);
}

message MetricRequest {
    string server_id = 1;
    float cpu_usage = 2;
    uint64 free_disk_space = 3;
    int64 timestamp = 4;
}

message MetricResponse {
    bool success = 1;
    string message = 2;
}